name: GitHub Metrics
on:
  schedule: [{ cron: "0 */12 * * *" }]
  workflow_dispatch:
  push: { branches: ["master", "main"] }
jobs:
  generate-metrics:
    runs-on: ubuntu-latest
    steps:
      - name: Overview & Base Metrics
        uses: lowlighter/metrics@latest
        with:
          filename: assets/metrics.plugin.code.lines.svg
          token: ${{ secrets.METRICS_TOKEN }}
          committer_token: ${{ secrets.GITHUB_TOKEN }}
          base: header, activity, community, repositories
          plugin_lines: yes
          plugin_lines_sections: base, repositories
          plugin_lines_repositories_limit: 4
          user: rishi-tiwari023
          config_timezone: Asia/Calcutta

      - name: Achievements
        uses: lowlighter/metrics@latest
        with:
          filename: assets/metrics.plugin.achievements.svg
          token: ${{ secrets.METRICS_TOKEN }}
          committer_token: ${{ secrets.GITHUB_TOKEN }}
          user: rishi-tiwari023
          base: ""
          plugin_achievements: yes
          plugin_achievements_display: compact
          plugin_achievements_secrets: yes

      - name: Language Activity
        uses: lowlighter/metrics@latest
        with:
          filename: assets/metrics.plugin.languages.activity.svg
          token: ${{ secrets.METRICS_TOKEN }}
          committer_token: ${{ secrets.GITHUB_TOKEN }}
          base: ""
          plugin_languages: yes
          plugin_languages_sections: most-used
          plugin_languages_details: percentage
          user: rishi-tiwari023

      - name: Notable Contributions
        uses: lowlighter/metrics@latest
        with:
          filename: assets/metrics.plugin.notable.contributions.svg
          token: ${{ secrets.METRICS_TOKEN }}
          committer_token: ${{ secrets.GITHUB_TOKEN }}
          base: ""
          plugin_notable: yes
          plugin_notable_from: all
          user: rishi-tiwari023

      - name: Discussions & Reactions
        uses: lowlighter/metrics@latest
        with:
          filename: assets/metrics.plugin.discussions.svg
          token: ${{ secrets.METRICS_TOKEN }}
          committer_token: ${{ secrets.GITHUB_TOKEN }}
          base: ""
          plugin_discussions: yes
          plugin_reactions: yes
          user: rishi-tiwari023

      - name: Follow-up Stats
        uses: lowlighter/metrics@latest
        with:
          filename: assets/metrics.plugin.followup.svg
          token: ${{ secrets.METRICS_TOKEN }}
          committer_token: ${{ secrets.GITHUB_TOKEN }}
          base: ""
          plugin_followup: yes
          user: rishi-tiwari023

      - name: LeetCode Performance
        uses: lowlighter/metrics@latest
        with:
          filename: assets/metrics.plugin.leetcode.svg
          token: NOT_NEEDED
          committer_token: ${{ secrets.GITHUB_TOKEN }}
          base: ""
          plugin_leetcode: yes
          plugin_leetcode_user: 2311038_cscysIIB
          plugin_leetcode_sections: solved, skills, recent
          user: rishi-tiwari023
